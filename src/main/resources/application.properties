# =============================================================================
# IncidentIQ — runtime config
#
# Every value below uses the Spring placeholder syntax ${ENV_NAME:default} so
# the same file works in both local-dev and Docker:
#   - Local:  defaults are applied (localhost MySQL, empty Gemini key, etc.)
#   - Docker: docker-compose.yml passes env vars that override the defaults.
#
# Real secrets live in .env (gitignored). Don't put live keys here.
# =============================================================================

server.port=${SERVER_PORT:8080}

# --- MySQL ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/incident_iq?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- schema.sql runs AFTER Hibernate (FULLTEXT index) ---
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# --- Google Gemini (direct REST via Generative Language API) ---
# Empty key → AI features return graceful errors. Get a free key at
# https://aistudio.google.com/app/apikey
app.gemini.api-key=${APP_GEMINI_API_KEY:}
app.gemini.model=${APP_GEMINI_MODEL:gemini-2.5-flash}
app.gemini.temperature=${APP_GEMINI_TEMPERATURE:0.3}

# --- IncidentIQ branding (used in PDF + UI) ---
app.system-name=${APP_SYSTEM_NAME:IncidentIQ}
app.organization-name=${APP_ORGANIZATION_NAME:Demo Org}

# --- Logging ---
logging.level.com.incidentmgmt=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=INFO
